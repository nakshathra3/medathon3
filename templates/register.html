<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <h1>Registration Form</h1>
    <form>
        <label for="patientName">Patient Name:</label><br>
        <input type="text" id="patientName" name="patientName" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="phone">Phone:</label><br>
        <input type="tel" id="phone" name="phone" required><br><br>

        <label for="emergencyContactName">Emergency Contact Name:</label><br>
        <input type="text" id="emergencyContactName" name="emergencyContactName" required><br><br>

        <label for="emergencyContactPhone">Emergency Contact Phone:</label><br>
        <input type="tel" id="emergencyContactPhone" name="emergencyContactPhone" required><br><br>

        <label for="doctorName">Doctor Name:</label><br>
        <input type="text" id="doctorName" name="doctorName" required><br><br>

        <label for="doctorContact">Doctor Contact:</label><br>
        <input type="tel" id="doctorContact" name="doctorContact" required><br><br>

        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password" required><br><br>

        <input type="submit" value="Register">
    </form>
</body>
</html>
